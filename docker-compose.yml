version: "3.9"

services:
  api:
    build: .
    environment:
      - ADMIN_API_KEY=dev-key
      - SCHEDULER_ENABLED=false
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config
    ports:
      - "8000:8000"
    restart: always

